<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice-to-SQL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/i18next@23.10.1/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@2.5.0/i18nextHttpBackend.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>

    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header class="app-header">
        <div class="app-logo">
            <div class="app-logo-mark">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 2v6M8 10v.5M5 4.5a3 3 0 1 0 6 0" />
                </svg>
            </div>
            <span class="app-logo-name">Voice<span>SQL</span></span>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="ru">RU</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="sk">SK</button>
        </div>
    </header>

    <!-- ── App shell ──────────────────────────────────────────────── -->
    <div class="app-main">

        <!-- ── Sidebar ──────────────────────────────────────────── -->
        <aside class="sidebar">
            <div class="sidebar-section-label" data-i18n="ui.selectDbTitle">Databases</div>
            <div class="db-list" id="dbChips">
                <span class="db-item" style="opacity:0.4">
                    <span class="db-item-dot"></span>
                    <span class="db-item-name" data-i18n="ui.loading">Loading...</span>
                </span>
            </div>

            <input type="file" id="dbFileInput" accept=".sqlite,.db" class="hidden">
            <button class="db-upload-btn" id="uploadDbBtn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 11V3M5 6l3-3 3 3"/>
                    <path d="M2 13h12"/>
                </svg>
                <span data-i18n="ui.uploadDb">Upload database</span>
            </button>

            <div class="sidebar-divider"></div>

            <div class="db-desc-box">
                <div class="db-desc-text" id="dbHoverDesc" data-i18n="ui.descDefault">Select a database</div>
            </div>
        </aside>

        <!-- ── Main ─────────────────────────────────────────────── -->
        <main class="main-content">

            <!-- Input panel -->
            <div class="panel">
                <div class="input-panel-top">
                    <span class="current-db-label" id="currentDbLabel">chinook.sqlite</span>
                    <button id="schemaButton" class="schema-toggle-btn" data-i18n="ui.schemaBtnShow">Show schema</button>
                </div>

                <div id="schemaContainer" class="hidden">
                    <div id="visualSchema" class="schema-grid" data-i18n="ui.loading">Loading...</div>
                </div>

                <button id="recordButton" data-i18n="ui.recordBtnStart">Start recording</button>

                <div id="status" data-i18n="ui.statusReady">Ready</div>

                <div id="editorSection" class="hidden">
                    <textarea id="textInput" data-i18n="[placeholder]ui.placeholderDefault"></textarea>
                    <button id="sendButton" data-i18n="ui.sendBtn">Run query</button>
                </div>
                <div class="ctrl-hint" id="ctrlHint" data-i18n="ui.ctrlHint">Ctrl+Enter to send</div>
            </div>

            <!-- History panel -->
            <div class="panel hidden" id="historyCard">
                <div class="history-header" id="historyTitle" data-i18n="ui.historyTitle">Query history</div>
                <div id="historyList"></div>
            </div>

            <!-- Skeleton -->
            <div class="panel hidden" id="skeletonCard">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-code"></div>
                <div class="skeleton skeleton-chart"></div>
                <div class="skeleton skeleton-row"></div>
                <div class="skeleton skeleton-row"></div>
                <div class="skeleton skeleton-row"></div>
            </div>

            <!-- Result panel -->
            <div id="resultCard" class="panel hidden">

                <div class="result-explanation hidden" id="aiExplanation"></div>

                <div class="sql-block-header">
                    <span class="sql-block-label">SQL</span>
                    <div class="sql-block-actions">
                        <button id="editSqlBtn" class="btn-icon" data-i18n="ui.edit">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11.5 2.5a1.41 1.41 0 0 1 2 2L5 13H2v-3L11.5 2.5z"/>
                            </svg>
                            Edit
                        </button>
                        <button id="copySqlBtn" class="btn-icon" data-i18n="ui.copy">
                            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="5" y="5" width="9" height="9" rx="1"/>
                                <path d="M11 5V3a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h2"/>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>
                <div class="sql-code" id="sqlQuery"></div>

                <div id="sqlEditorSection" class="hidden">
                    <textarea id="sqlEditor" spellcheck="false" data-i18n="[placeholder]ui.sqlEditorPlaceholder"></textarea>
                    <div class="sql-editor-actions">
                        <button id="runSqlBtn" class="btn-run" data-i18n="ui.runSql">Run</button>
                        <button id="cancelEditBtn" class="btn-cancel" data-i18n="ui.cancel">Cancel</button>
                    </div>
                </div>

                <button id="downloadCsvBtn" class="btn-csv hidden" data-i18n="ui.downloadCsvBtn">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 2v8M5 7l3 3 3-3M2 13h12"/>
                    </svg>
                    Export CSV
                </button>

                <div id="chartWrapper" class="chart-container hidden">
                    <canvas id="resultChart"></canvas>
                </div>

                <div class="table-responsive">
                    <div id="tableContainer"></div>
                </div>
            </div>

        </main>
    </div>

    <!-- ── Status bar ─────────────────────────────────────────────── -->
    <div class="status-bar">
        <div class="status-bar-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="8" cy="6" rx="6" ry="3.5"/>
                <path d="M2 6v4c0 1.93 2.69 3.5 6 3.5s6-1.57 6-3.5V6"/>
            </svg>
            <span id="statusBarDb">chinook.sqlite</span>
        </div>
        <div class="status-bar-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="6"/>
                <path d="M8 4v4l2.5 2.5"/>
            </svg>
            <span id="statusBarState" data-i18n="ui.statusReady">Ready</span>
        </div>
        <div class="status-bar-spacer"></div>
        <div class="status-bar-item">
            SQLite · Whisper-1 · GPT-4o
        </div>
        <div class="status-bar-item" id="statusBarLang">RU</div>
    </div>

</body>
</html>
